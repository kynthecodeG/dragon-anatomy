<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Canvas – Computer Graphics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050a12;
            overflow: hidden;
            cursor: none;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,200,80,0.6);
            font-size: 0.78rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            pointer-events: none;
            text-align: center;
            text-shadow: 0 0 12px rgba(255,150,0,0.5);
            animation: fadeHint 4s ease forwards;
        }

        @keyframes fadeHint {
            0%   { opacity: 0; }
            20%  { opacity: 1; }
            80%  { opacity: 1; }
            100% { opacity: 0; }
        }

        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }

        .ctrl-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,200,80,0.25);
            color: rgba(255,200,80,0.7);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: none;
            transition: background 0.2s, border-color 0.2s;
        }
        .ctrl-btn:hover {
            background: rgba(255,200,80,0.1);
            border-color: rgba(255,200,80,0.5);
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="ui">✦ Drag your cursor to guide the dragon ✦</div>
<div id="controls">
    <button class="ctrl-btn" id="btnFire" onclick="toggleFire()">🔥 Fire</button>
    <button class="ctrl-btn" id="btnWings" onclick="toggleWings()">🐉 Wings</button>
    <button class="ctrl-btn" onclick="clearTrail()">✦ Clear</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

// ── Resize ──────────────────────────────────────────────────────────────────
function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── State ────────────────────────────────────────────────────────────────────
let mouse    = { x: canvas.width/2,  y: canvas.height/2  };
let dragging = false;
let fireOn   = true;
let wingsOn  = true;
let t        = 0;
let particles = [];
let fireParticles = [];
let scorchMarks   = [];

// ── Dragon body segments (spine chain) ───────────────────────────────────────
const NUM_SEGMENTS = 28;
const SEG_LEN      = 22;

let segments = [];
for (let i = 0; i < NUM_SEGMENTS; i++) {
    segments.push({
        x: canvas.width  / 2 - i * SEG_LEN,
        y: canvas.height / 2,
        angle: 0
    });
}

// ── Input ────────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});
canvas.addEventListener('mousedown', e => { dragging = true;  mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mouseup',   ()  => { dragging = false; });
canvas.addEventListener('mouseleave',()  => { dragging = false; });

// Touch support
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
    dragging = true;
}, { passive: false });
canvas.addEventListener('touchend',  () => { dragging = false; });

// ── Toggle controls ───────────────────────────────────────────────────────────
function toggleFire()  { fireOn  = !fireOn;  }
function toggleWings() { wingsOn = !wingsOn; }
function clearTrail()  { scorchMarks = []; particles = []; }

// ── Utilities ─────────────────────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }
function dist(a, b) { return Math.hypot(b.x - a.x, b.y - a.y); }
function angle(a, b) { return Math.atan2(b.y - a.y, b.x - a.x); }
function randRange(min, max) { return min + Math.random() * (max - min); }

// ── Dragon color palette ──────────────────────────────────────────────────────
function scaleColor(i, total, alpha) {
    // Head: vivid emerald → tail: deep teal/black
    const ratio = i / total;
    const r = Math.round(lerp(20,  5,  ratio));
    const g = Math.round(lerp(220, 60, ratio));
    const b = Math.round(lerp(120, 40, ratio));
    return `rgba(${r},${g},${b},${alpha})`;
}

function glowColor(i, total) {
    const ratio = i / total;
    const r = Math.round(lerp(0,   0,  ratio));
    const g = Math.round(lerp(255,100, ratio));
    const b = Math.round(lerp(180, 60, ratio));
    return `rgba(${r},${g},${b},0.18)`;
}

// ── Update spine ──────────────────────────────────────────────────────────────
function updateSpine() {
    const speed = dragging ? 0.18 : 0.06;

    // Head chases mouse
    segments[0].x = lerp(segments[0].x, mouse.x, speed);
    segments[0].y = lerp(segments[0].y, mouse.y, speed);

    // Each segment follows the one ahead
    for (let i = 1; i < segments.length; i++) {
        const prev = segments[i-1];
        const curr = segments[i];
        const d    = dist(curr, prev);
        if (d > SEG_LEN) {
            const a = angle(curr, prev);
            curr.x  = prev.x - Math.cos(a) * SEG_LEN;
            curr.y  = prev.y - Math.sin(a) * SEG_LEN;
        }
        curr.angle = angle(curr, prev);
    }
}

// ── Scorch marks (trail on drag) ──────────────────────────────────────────────
function addScorch() {
    if (!dragging) return;
    const tail = segments[segments.length - 1];
    if (scorchMarks.length === 0 ||
        dist(scorchMarks[scorchMarks.length-1], tail) > 18) {
        scorchMarks.push({ x: tail.x, y: tail.y, alpha: 0.35, r: randRange(4,10) });
    }
    if (scorchMarks.length > 250) scorchMarks.shift();
}

function drawScorch() {
    for (let i = scorchMarks.length - 1; i >= 0; i--) {
        const s = scorchMarks[i];
        s.alpha -= 0.0008;
        if (s.alpha <= 0) { scorchMarks.splice(i, 1); continue; }
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(180,80,0,${s.alpha})`;
        ctx.fill();
    }
}

// ── Ambient floating particles ────────────────────────────────────────────────
function spawnParticles() {
    if (particles.length < 60) {
        particles.push({
            x: randRange(0, canvas.width),
            y: canvas.height + 10,
            vx: randRange(-0.3, 0.3),
            vy: randRange(-0.6, -1.4),
            size: randRange(1, 3),
            alpha: randRange(0.3, 0.8),
            color: `hsl(${randRange(100,160)}, 80%, 60%)`
        });
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.004;
        if (p.alpha <= 0 || p.y < -10) { particles.splice(i, 1); }
    }
}

function drawParticles() {
    for (const p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fillStyle = p.color.replace(')', `,${p.alpha})`).replace('hsl','hsla');
        ctx.fill();
    }
}

// ── Fire breath ───────────────────────────────────────────────────────────────
function spawnFire() {
    if (!fireOn || !dragging) return;
    const head = segments[0];
    const a    = segments[0].angle;
    for (let i = 0; i < 4; i++) {
        const spread = randRange(-0.4, 0.4);
        fireParticles.push({
            x:     head.x + Math.cos(a) * 18,
            y:     head.y + Math.sin(a) * 18,
            vx:    Math.cos(a + spread) * randRange(3, 7),
            vy:    Math.sin(a + spread) * randRange(3, 7),
            life:  1.0,
            decay: randRange(0.018, 0.035),
            size:  randRange(4, 12),
            hue:   randRange(10, 50)
        });
    }
}

function updateFire() {
    for (let i = fireParticles.length - 1; i >= 0; i--) {
        const f = fireParticles[i];
        f.x    += f.vx;
        f.y    += f.vy;
        f.vx   *= 0.97;
        f.vy   *= 0.97;
        f.size *= 0.97;
        f.life -= f.decay;
        if (f.life <= 0) { fireParticles.splice(i, 1); }
    }
}

function drawFire() {
    for (const f of fireParticles) {
        const grad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.size);
        grad.addColorStop(0,   `hsla(${f.hue+30},100%,90%,${f.life})`);
        grad.addColorStop(0.4, `hsla(${f.hue},100%,60%,${f.life*0.8})`);
        grad.addColorStop(1,   `hsla(${f.hue-10},100%,30%,0)`);
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.size, 0, Math.PI*2);
        ctx.fillStyle = grad;
        ctx.fill();
    }
}

// ── Draw one wing ─────────────────────────────────────────────────────────────
function drawWing(seg, side, waveOffset) {
    if (!wingsOn) return;
    const a    = seg.angle;
    const perp = a + (side * Math.PI / 2);
    const wave = Math.sin(t * 3 + waveOffset) * 0.3;
    const foldAngle = perp + wave;

    const baseX = seg.x;
    const baseY = seg.y;

    const W1 = 55, W2 = 90, W3 = 70;

    // Main membrane
    const p1x = baseX + Math.cos(foldAngle)                    * W1;
    const p1y = baseY + Math.sin(foldAngle)                    * W1;
    const p2x = baseX + Math.cos(foldAngle + side*0.6) * W2;
    const p2y = baseY + Math.sin(foldAngle + side*0.6) * W2;
    const p3x = baseX + Math.cos(foldAngle + side*1.1) * W3;
    const p3y = baseY + Math.sin(foldAngle + side*1.1) * W3;
    const p4x = baseX + Math.cos(a + side*0.2)          * 30;
    const p4y = baseY + Math.sin(a + side*0.2)          * 30;

    // Wing membrane gradient
    const grad = ctx.createLinearGradient(baseX, baseY, p2x, p2y);
    grad.addColorStop(0,   'rgba(10,180,90,0.55)');
    grad.addColorStop(0.5, 'rgba(5,120,60,0.35)');
    grad.addColorStop(1,   'rgba(0,60,30,0.1)');

    ctx.beginPath();
    ctx.moveTo(baseX, baseY);
    ctx.bezierCurveTo(p1x, p1y, p2x, p2y, p3x, p3y);
    ctx.bezierCurveTo(p3x, p3y, p4x, p4y, baseX, baseY);
    ctx.fillStyle   = grad;
    ctx.strokeStyle = 'rgba(20,220,100,0.3)';
    ctx.lineWidth   = 0.8;
    ctx.fill();
    ctx.stroke();

    // Wing spines
    ctx.strokeStyle = 'rgba(30,220,110,0.5)';
    ctx.lineWidth   = 1;
    [[p1x,p1y],[p2x,p2y],[p3x,p3y]].forEach(([px,py]) => {
        ctx.beginPath();
        ctx.moveTo(baseX, baseY);
        ctx.lineTo(px, py);
        ctx.stroke();
    });
}

// ── Draw spines along back ────────────────────────────────────────────────────
function drawDorsal(seg, i) {
    if (i % 2 !== 0 || i > NUM_SEGMENTS - 5) return;
    const sizeScale = 1 - i / NUM_SEGMENTS;
    const spineLen  = (8 + sizeScale * 18) * (1 + Math.sin(t*4 + i)*0.1);
    const perpAngle = seg.angle - Math.PI/2;

    ctx.beginPath();
    ctx.moveTo(seg.x, seg.y);
    ctx.lineTo(
        seg.x + Math.cos(perpAngle) * spineLen,
        seg.y + Math.sin(perpAngle) * spineLen
    );
    ctx.strokeStyle = `rgba(20,255,120,${0.5 * sizeScale})`;
    ctx.lineWidth   = 1.5 * sizeScale;
    ctx.stroke();
}

// ── Draw head ─────────────────────────────────────────────────────────────────
function drawHead() {
    const h    = segments[0];
    const prev = segments[1];
    const a    = angle(prev, h);

    ctx.save();
    ctx.translate(h.x, h.y);
    ctx.rotate(a);

    // Jaw / snout
    ctx.beginPath();
    ctx.ellipse(14, 0, 22, 11, 0, 0, Math.PI*2);
    const snoutGrad = ctx.createRadialGradient(10,0,2, 14,0,22);
    snoutGrad.addColorStop(0,   'rgba(30,230,120,1)');
    snoutGrad.addColorStop(0.6, 'rgba(10,160,70,1)');
    snoutGrad.addColorStop(1,   'rgba(5,80,40,0.8)');
    ctx.fillStyle = snoutGrad;
    ctx.fill();

    // Eye
    ctx.beginPath();
    ctx.ellipse(18, -5, 5, 4, 0.3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,220,0,0.95)';
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(19, -5, 2.5, 3.5, 0.3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.9)';
    ctx.fill();
    // Eye glow
    ctx.beginPath();
    ctx.ellipse(18, -5, 7, 6, 0.3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,220,0,0.15)';
    ctx.fill();

    // Nostril
    ctx.beginPath();
    ctx.ellipse(30, -3, 2.5, 1.5, 0.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fill();

    // Horns
    ctx.strokeStyle = 'rgba(20,255,110,0.8)';
    ctx.lineWidth   = 2;
    ctx.lineCap     = 'round';
    [[-0.5,1.3],[-0.3,0.9]].forEach(([ox,oy]) => {
        ctx.beginPath();
        ctx.moveTo(5 + ox*2, -8);
        ctx.quadraticCurveTo(2+ox*10, -22+oy*4, 0+ox*14, -18+oy*2);
        ctx.stroke();
    });

    // Teeth
    ctx.fillStyle = 'rgba(255,255,240,0.9)';
    for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(10 + i*5, 7);
        ctx.lineTo(12 + i*5, 13);
        ctx.lineTo(14 + i*5, 7);
        ctx.fill();
    }

    ctx.restore();
}

// ── Draw full dragon body ─────────────────────────────────────────────────────
function drawDragon() {
    // Glow pass
    for (let i = 1; i < segments.length - 1; i++) {
        const s    = segments[i];
        const prev = segments[i-1];
        const w    = (1 - i/segments.length) * 18 + 4;
        ctx.beginPath();
        ctx.moveTo(prev.x, prev.y);
        ctx.lineTo(s.x, s.y);
        ctx.strokeStyle = glowColor(i, segments.length);
        ctx.lineWidth   = w * 2.5;
        ctx.lineCap     = 'round';
        ctx.stroke();
    }

    // Scales / body
    for (let i = segments.length - 1; i >= 1; i--) {
        const s    = segments[i];
        const prev = segments[i-1];
        const w    = (1 - i/segments.length) * 16 + 3;

        ctx.beginPath();
        ctx.moveTo(prev.x, prev.y);
        ctx.lineTo(s.x, s.y);
        ctx.strokeStyle = scaleColor(i, segments.length, 1);
        ctx.lineWidth   = w;
        ctx.lineCap     = 'round';
        ctx.stroke();

        // Scale highlight
        ctx.beginPath();
        ctx.moveTo(prev.x, prev.y);
        ctx.lineTo(s.x, s.y);
        ctx.strokeStyle = `rgba(100,255,160,${0.12 * (1-i/segments.length)})`;
        ctx.lineWidth   = w * 0.4;
        ctx.stroke();
    }

    // Dorsal spines
    for (let i = 1; i < segments.length - 4; i++) {
        drawDorsal(segments[i], i);
    }

    // Wings (attached near shoulders — segment 3)
    drawWing(segments[3], -1, 0);
    drawWing(segments[3],  1, Math.PI);

    // Tail tip spark
    const tail = segments[segments.length - 1];
    const tg   = ctx.createRadialGradient(tail.x, tail.y, 0, tail.x, tail.y, 8);
    tg.addColorStop(0,   'rgba(100,255,150,0.8)');
    tg.addColorStop(1,   'rgba(0,200,80,0)');
    ctx.beginPath();
    ctx.arc(tail.x, tail.y, 8, 0, Math.PI*2);
    ctx.fillStyle = tg;
    ctx.fill();

    // Head
    drawHead();
}

// ── Custom cursor ─────────────────────────────────────────────────────────────
function drawCursor() {
    ctx.save();
    ctx.translate(mouse.x, mouse.y);

    // Outer ring
    ctx.beginPath();
    ctx.arc(0, 0, dragging ? 6 : 10, 0, Math.PI*2);
    ctx.strokeStyle = dragging ? 'rgba(255,150,0,0.9)' : 'rgba(20,255,120,0.7)';
    ctx.lineWidth   = 1.5;
    ctx.stroke();

    // Inner dot
    ctx.beginPath();
    ctx.arc(0, 0, 2, 0, Math.PI*2);
    ctx.fillStyle = dragging ? 'rgba(255,150,0,1)' : 'rgba(20,255,120,1)';
    ctx.fill();

    // Cross hairs
    ctx.strokeStyle = dragging ? 'rgba(255,150,0,0.5)' : 'rgba(20,255,120,0.4)';
    ctx.lineWidth   = 1;
    const s = dragging ? 4 : 6, e = dragging ? 10 : 15;
    [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dx,dy]) => {
        ctx.beginPath();
        ctx.moveTo(dx*s, dy*s);
        ctx.lineTo(dx*e, dy*e);
        ctx.stroke();
    });

    ctx.restore();
}

// ── Ambient stars ─────────────────────────────────────────────────────────────
const stars = Array.from({length:120}, () => ({
    x:     Math.random() * window.innerWidth,
    y:     Math.random() * window.innerHeight,
    r:     Math.random() * 1.2,
    alpha: Math.random()
}));

function drawStars() {
    for (const s of stars) {
        s.alpha += (Math.random() - 0.5) * 0.02;
        s.alpha  = Math.max(0.1, Math.min(0.9, s.alpha));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(200,255,220,${s.alpha})`;
        ctx.fill();
    }
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function loop() {
    t += 0.016;

    // Dark sky background
    ctx.fillStyle = 'rgba(5,10,18,0.30)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawStars();
    drawScorch();
    updateParticles();
    drawParticles();
    spawnParticles();

    updateSpine();
    addScorch();

    spawnFire();
    updateFire();
    drawFire();

    drawDragon();
    drawCursor();

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
